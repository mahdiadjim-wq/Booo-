<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Your Path</title>

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
    font-family: Arial;
    overflow: hidden;
    color: white;
}

/* 🌌 النجوم */
canvas {
    position:absolute;
    top:0;
    left:0;
}

/* overlay */
.overlay {
    position:absolute;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(0,0,0,0.6), black);
}

/* main */
#main {
    position:relative;
    z-index:2;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    animation: fadeIn 2s ease;
}

h1 {
    margin-bottom:30px;
    font-size:2rem;
    animation: float 3s infinite ease-in-out;
}

/* ✨ أزرار */
.btn {
    padding:15px;
    margin:10px;
    font-size:1.3rem;
    border:none;
    border-radius:12px;
    cursor:pointer;
    width:220px;
    transition:0.3s;
}

/* glow effect */
.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px white;
}

/* القمر */
.moon {
    background:#1a1a2e;
}

/* الشمس */
.sun {
    background:gold;
    color:black;
}

/* 📜 صفحة السورة */
#surahPage {
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:black;
    overflow-y:auto;
    padding:20px;
    direction:rtl;
    animation: fadeIn 1s ease;
}

.back {
    background:red;
    color:white;
    padding:10px;
    border:none;
    border-radius:10px;
    margin-bottom:20px;
    cursor:pointer;
}

/* ✨ animations */
@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>
<div class="overlay"></div>

<div id="main">
    <h1>Choose the candle or the moon</h1>
    <button class="btn moon" onclick="showSurah('qamar')">🌙 Moon</button>
    <button class="btn sun" onclick="showSurah('shams')">☀️ Sun</button>
</div>

<div id="surahPage">
    <button class="back" onclick="goBack()">⬅ رجوع</button>
    <h2 id="title"></h2>
    <p id="text"></p>
</div>

<script>
/* 🌟 نجوم + twinkle + shooting stars */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let shootingStars = [];

/* stars */
for (let i = 0; i < 150; i++) {
    stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        alpha: Math.random(),
        speed: Math.random()*0.5
    });
}

/* shooting star */
function createShootingStar(){
    shootingStars.push({
        x: Math.random()*canvas.width,
        y: 0,
        length: Math.random()*80,
        speed: 5
    });
}

/* draw */
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* stars */
    stars.forEach(star=>{
        star.alpha += (Math.random()-0.5)*0.1;

        ctx.fillStyle = "rgba(255,255,255,"+star.alpha+")";
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI*2);
        ctx.fill();

        star.y += star.speed;
        if(star.y > canvas.height){
            star.y = 0;
            star.x = Math.random()*canvas.width;
        }
    });

    /* shooting stars */
    shootingStars.forEach((s, i)=>{
        ctx.strokeStyle="white";
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x - s.length, s.y + s.length);
        ctx.stroke();

        s.x += s.speed;
        s.y += s.speed;

        if(s.y > canvas.height){
            shootingStars.splice(i,1);
        }
    });

    requestAnimationFrame(draw);
}
draw();

/* كل شوية يطيح نجم */
setInterval(createShootingStar, 2000);

/* 📜 السور */
const qamar = "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ...";
const shams = "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ...";

function showSurah(type){
    document.getElementById("main").style.display="none";
    document.getElementById("surahPage").style.display="block";

    if(type==="qamar"){
        title.innerText="سورة القمر";
        text.innerText=qamar;
    } else {
        title.innerText="سورة الشمس";
        text.innerText=shams;
    }
}

function goBack(){
    document.getElementById("main").style.display="flex";
    document.getElementById("surahPage").style.display="none";
}

/* resize */
window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
