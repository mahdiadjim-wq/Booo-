<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Glow Stars</title>
<style>
  /* ====== الخلفية ====== */
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #0a1f3d 0%, #1e1f42 100%);
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: #fff;
  }

  /* ====== container أيقونات في الوسط ====== */
  .center-icons {
    display: flex;
    gap: 80px;
    z-index: 10;
    position: relative;
  }

  /* ====== أيقونات كبيرة ومتناسقة ====== */
  .weather-icon {
    position: relative;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(145deg, #6bc1ff, #1e90ff);
    color: #fff;
    font-size: 48px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0,255,255,0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: float 3s ease-in-out infinite;
  }

  .weather-icon:hover {
    transform: scale(1.25);
    box-shadow: 0 0 30px rgba(0,255,255,0.6);
  }

  /* ====== sparkle داخل الأيقونات ====== */
  .weather-icon::after {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
    opacity: 0.5;
    animation: spark 0.6s infinite alternate;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  @keyframes spark {
    0% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.5); opacity: 1; }
    100% { transform: scale(1); opacity: 0.4; }
  }

  /* ====== popup ====== */
  .popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,50,0.85);
    padding: 50px 70px;
    border-radius: 25px;
    text-align: center;
    font-size: 28px;
    line-height: 1.6;
    color: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 100;
    text-shadow: 0 0 8px rgba(0,0,0,0.7);
  }

  .popup.show { opacity: 1; pointer-events: auto; }

  .popup button {
    margin-top: 25px;
    padding: 12px 30px;
    border: none;
    background: linear-gradient(135deg, #6bc1ff, #1e90ff);
    color: #fff;
    font-weight: bold;
    font-size: 18px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,255,255,0.3);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .popup button::after {
    content: '';
    position: absolute;
    inset: -0.2em;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 70%);
    opacity: 0.3;
    animation: spark 0.6s infinite alternate;
    z-index: -1;
  }

  .popup button:hover {
    transform: scale(1.15);
    box-shadow: 0 8px 25px rgba(0,255,255,0.5);
  }

  /* ====== canvas للنجوم ====== */
  canvas { position: absolute; top:0; left:0; display:block; z-index:1; }

</style>
</head>
<body>

<div class="center-icons">
  <div class="weather-icon sun">☀️</div>
  <div class="weather-icon moon">🌙</div>
</div>

<div class="popup" id="popup">
  <div id="popupText"></div>
  <button onclick="closePopup()">اغلاق</button>
</div>

<canvas id="starsCanvas"></canvas>

<script>
  // Popup
  const popup = document.getElementById('popup');
  const popupText = document.getElementById('popupText');

  document.querySelector('.sun').addEventListener('click', () => {
    popupText.textContent = "إِنَّ الْمُتَّقِينَ فِي جَنَّاتٍ وَنَهَرٍ ۝ فِي مَقْعَدِ صِدْقٍ عِندَ مَلِيكٍ مُقْتَدِرٍ";
    popup.classList.add('show');
  });

  document.querySelector('.moon').addEventListener('click', () => {
    popupText.textContent = "وَدَّ أَفْلَحَ مَن زَكَّاهَا ۝ وَقَدْ خَابَ مَن دَسَّاهَا";
    popup.classList.add('show');
  });

  function closePopup() { popup.classList.remove('show'); }

  // Stars background
  const canvas = document.getElementById('starsCanvas');
  const ctx = canvas.getContext('2d');
  let w = canvas.width = window.innerWidth;
  let h = canvas.height = window.innerHeight;

  const stars = [];
  const numStars = 150; // نجوم قليلة وهادئة

  for(let i=0;i<numStars;i++){
    stars.push({ x: Math.random()*w, y: Math.random()*h, r: Math.random()*1.5+0.5, opacity: Math.random() });
  }

  function animateStars(){
    ctx.fillStyle = '#0a1f3d'; // لون داكن للخلفية
    ctx.fillRect(0,0,w,h);
    for(let i=0;i<numStars;i++){
      const s = stars[i];
      s.opacity += (Math.random()-0.5)*0.02; // خفيفة توهج
      if(s.opacity<0) s.opacity=0;
      if(s.opacity>1) s.opacity=1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
      ctx.fill();
    }
    requestAnimationFrame(animateStars);
  }
  animateStars();

  window.addEventListener('resize', ()=>{
    w=canvas.width=window.innerWidth;
    h=canvas.height=window.innerHeight;
  });
</script>

</body>
</html>
