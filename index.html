<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booo- Cute 3D Stars</title>
<style>
    /* ======= الخلفية والنص ======= */
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(#1e1f42, #0b0c2a);
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 1000px;
        font-family: 'Arial', sans-serif;
        color: #fff;
    }

    /* ======= الأيقونات ======= */
    .icons {
        display: flex;
        gap: 60px;
        z-index: 10;
        position: relative;
    }

    .icon {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 60px;
        color: #fff;
        cursor: pointer;
        background: radial-gradient(circle at 30% 30%, #ffdd88, #fcbf49);
        position: relative;
    }

    .icon.moon {
        background: radial-gradient(circle at 30% 30%, #cfd6e6, #6b7dff);
        color: #f0f8ff;
    }

    /* ======= sparkle effect ======= */
    .icon::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
        opacity: 0;
        transition: opacity 0.4s;
    }

    .icon:hover::after {
        opacity: 1;
        transform: scale(1.2);
    }

    /* ======= نافذة الآيات ======= */
    .popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.75);
        padding: 40px 60px;
        border-radius: 25px;
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        line-height: 1.8;
        color: #fff;
        max-width: 90%;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease;
        z-index: 100;
        text-shadow: 0 0 10px rgba(0,0,0,0.7);
    }

    .popup.show {
        opacity: 1;
        pointer-events: auto;
    }

    /* ======= الزر الأنيق ======= */
    .popup button {
        margin-top: 20px;
        padding: 12px 28px;
        border: none;
        background: linear-gradient(135deg, #ffdd88, #fcbf49);
        color: #0b0c2a;
        font-weight: bold;
        font-size: 18px;
        border-radius: 50px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
        box-shadow: 0 5px 15px rgba(255,221,0,0.4);
    }

    .popup button::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 70%);
        opacity: 0;
        transition: opacity 0.3s;
    }

    .popup button:hover::after {
        opacity: 1;
        transform: scale(1.2);
    }

    .popup button:hover {
        transform: scale(1.15);
        box-shadow: 0 8px 25px rgba(255,221,0,0.6);
    }

    /* ======= canvas للنجوم ======= */
    canvas {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
        z-index: 1;
    }

</style>
</head>
<body>

<div class="icons">
    <div class="icon sun">☀️</div>
    <div class="icon moon">🌘</div>
</div>

<div class="popup" id="popup">
    <div id="popupText"></div>
    <button onclick="closePopup()">اغلاق</button>
</div>

<canvas id="starsCanvas"></canvas>

<script>
    /* ======= Popup الآيات ======= */
    const popup = document.getElementById('popup');
    const popupText = document.getElementById('popupText');

    document.querySelector('.icon.sun').addEventListener('click', () => {
        popupText.textContent = "إِنَّ الْمُتَّقِينَ فِي جَنَّاتٍ وَنَهَرٍ ۝ فِي مَقْعَدِ صِدْقٍ عِندَ مَلِيكٍ مُقْتَدِرٍ";
        popup.classList.add('show');
    });

    document.querySelector('.icon.moon').addEventListener('click', () => {
        popupText.textContent = "وَدَّ أَفْلَحَ مَن زَكَّاهَا ۝ وَقَدْ خَابَ مَن دَسَّاهَا";
        popup.classList.add('show');
    });

    function closePopup(){
        popup.classList.remove('show');
    }

    /* ======= نجوم 3D متحركة ======= */
    const canvas = document.getElementById('starsCanvas');
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    const stars = [];
    const numStars = 400;

    for(let i=0; i<numStars; i++){
        stars.push({
            x: Math.random()*w - w/2,
            y: Math.random()*h - h/2,
            z: Math.random()*w,
            size: Math.random()*2+0.5
        });
    }

    function animateStars(){
        ctx.fillStyle = 'rgba(30,31,66,0.7)';
        ctx.fillRect(0,0,w,h);

        for(let i=0; i<numStars; i++){
            const star = stars[i];
            star.z -= 2;
            if(star.z < 1) star.z = w;

            const sx = (star.x / star.z) * 500 + w/2;
            const sy = (star.y / star.z) * 500 + h/2;
            const r = (1 - star.z / w) * star.size * 2;

            ctx.beginPath();
            ctx.arc(sx, sy, r, 0, Math.PI*2);
            ctx.fillStyle = 'white';
            ctx.fill();
        }

        requestAnimationFrame(animateStars);
    }

    animateStars();

    window.addEventListener('resize', () => {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    });
</script>

</body>
</html>
