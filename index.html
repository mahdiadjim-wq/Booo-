<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Escape Game 😈</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle, #000, #0f2027);
    font-family: Arial;
    color: white;
}

/* HUD */
#hud {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 18px;
}

/* Button */
.btn {
    position: absolute;
    padding: 14px 28px;
    border: none;
    border-radius: 12px;
    background: #00eaff;
    color: black;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 0 20px #00eaff;
    transition: transform 0.1s;
}

/* Glow pulse */
@keyframes pulse {
    0% {box-shadow: 0 0 10px #00eaff;}
    50% {box-shadow: 0 0 30px #00eaff;}
    100% {box-shadow: 0 0 10px #00eaff;}
}

.btn {
    animation: pulse 1s infinite;
}

/* Trail */
.trail {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #00eaff;
    border-radius: 50%;
    opacity: 0.7;
    animation: fade 0.5s linear forwards;
}

@keyframes fade {
    to {opacity: 0; transform: scale(2);}
}

/* Explosion */
.explosion {
    position: absolute;
    width: 20px;
    height: 20px;
    background: yellow;
    border-radius: 50%;
    animation: boom 0.4s ease-out forwards;
}

@keyframes boom {
    to {transform: scale(6); opacity: 0;}
}
</style>
</head>

<body>

<div id="hud">Level: 1 | Score: 0</div>
<button id="btn" class="btn">Tap me</button>

<script>
let btn = document.getElementById("btn");
let hud = document.getElementById("hud");

let level = 1;
let score = 0;

let fingerX = 0;
let fingerY = 0;

// trail effect
function trail(x,y){
    let t = document.createElement("div");
    t.className = "trail";
    t.style.left = x + "px";
    t.style.top = y + "px";
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),500);
}

// explosion
function explode(x,y){
    let e = document.createElement("div");
    e.className="explosion";
    e.style.left=x+"px";
    e.style.top=y+"px";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),400);
}

// screen shake
function shake(){
    document.body.style.transform = "translate(5px,5px)";
    setTimeout(()=>document.body.style.transform="translate(0,0)",100);
}

// AI escape
function aiMove(){
    let rect = btn.getBoundingClientRect();
    let bx = rect.left + rect.width/2;
    let by = rect.top + rect.height/2;

    let dx = bx - fingerX;
    let dy = by - fingerY;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 150){
        let angle = Math.atan2(dy,dx);
        let speed = 60 + level*10;

        let nx = rect.left + Math.cos(angle)*speed;
        let ny = rect.top + Math.sin(angle)*speed;

        nx = Math.max(0, Math.min(window.innerWidth-120,nx));
        ny = Math.max(0, Math.min(window.innerHeight-80,ny));

        btn.style.left = nx+"px";
        btn.style.top = ny+"px";

        trail(nx,ny);
    }
}

// finger tracking
document.addEventListener("touchmove",(e)=>{
    fingerX = e.touches[0].clientX;
    fingerY = e.touches[0].clientY;
    aiMove();
});

// click
btn.addEventListener("touchstart",(e)=>{
    explode(e.touches[0].clientX, e.touches[0].clientY);
    shake();

    score++;
    level++;

    alert("🔥 SPEED UP!");

    hud.innerText = `Level: ${level} | Score: ${score}`;
});

// start position
btn.style.left="50%";
btn.style.top="60%";
</script>

</body>
</html>
