<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Glow Popup</title>
<style>
  /* ====== الخلفية ====== */
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(180deg, #a3c4f3 0%, #1e1f42 100%);
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: #fff;
  }

  /* ====== container للأيقونات ====== */
  .weather-container {
    position: absolute;
    bottom: 25px;
    left: 25px;
    display: flex;
    gap: 50px;
    z-index: 10;
  }

  /* ====== أيقونات water cute ====== */
  .weather-icon {
    position: relative;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(145deg, #6bc1ff, #1e90ff);
    color: #fff;
    font-size: 32px;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(0,255,255,0.4);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .weather-icon:hover {
    transform: scale(1.2);
    box-shadow: 0 0 25px rgba(0,255,255,0.6);
  }

  /* ====== sparkle water ====== */
  .weather-icon::after {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
    opacity: 0.5;
    animation: spark 0.6s infinite alternate;
  }

  @keyframes spark {
    0% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.5); opacity: 1; }
    100% { transform: scale(1); opacity: 0.4; }
  }

  /* ====== popup ====== */
  .popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,50,0.85);
    padding: 40px 60px;
    border-radius: 25px;
    text-align: center;
    font-size: 26px;
    line-height: 1.6;
    color: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 100;
    text-shadow: 0 0 8px rgba(0,0,0,0.7);
  }

  .popup.show { opacity: 1; pointer-events: auto; }

  /* ====== زر cute ====== */
  .popup button {
    margin-top: 20px;
    padding: 10px 26px;
    border: none;
    background: linear-gradient(135deg, #6bc1ff, #1e90ff);
    color: #fff;
    font-weight: bold;
    font-size: 16px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(0,255,255,0.3);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .popup button::after {
    content: '';
    position: absolute;
    inset: -0.2em;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 70%);
    opacity: 0.3;
    animation: spark 0.6s infinite alternate;
    z-index: -1;
  }

  .popup button:hover {
    transform: scale(1.15);
    box-shadow: 0 6px 20px rgba(0,255,255,0.5);
  }

</style>
</head>
<body>

<div class="weather-container">
  <div class="weather-icon sun">☀️</div>
  <div class="weather-icon moon">🌙</div>
</div>

<div class="popup" id="popup">
  <div id="popupText"></div>
  <button onclick="closePopup()">اغلاق</button>
</div>

<script>
  const popup = document.getElementById('popup');
  const popupText = document.getElementById('popupText');

  document.querySelector('.sun').addEventListener('click', () => {
    popupText.textContent = "إِنَّ الْمُتَّقِينَ فِي جَنَّاتٍ وَنَهَرٍ ۝ فِي مَقْعَدِ صِدْقٍ عِندَ مَلِيكٍ مُقْتَدِرٍ";
    popup.classList.add('show');
  });

  document.querySelector('.moon').addEventListener('click', () => {
    popupText.textContent = "وَدَّ أَفْلَحَ مَن زَكَّاهَا ۝ وَقَدْ خَابَ مَن دَسَّاهَا";
    popup.classList.add('show');
  });

  function closePopup() { popup.classList.remove('show'); }
</script>

</body>
</html>
