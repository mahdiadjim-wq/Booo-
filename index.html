<!DOCTYPE html>
<html>
<head>
    <title>👍🏼 Hacker Mode</title>
    <style>
        body { margin:0; background:black; overflow:hidden; font-family:monospace; color:#0f0;}
        #centerText {
            position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%);
            font-size:60px;
            text-shadow:0 0 20px #0f0;
            transition: all 0.1s ease;
        }
        #terminal {
            position:absolute; bottom:10px; left:10px;
            color:#0f0;
            font-size:16px;
            white-space:pre;
            font-family:monospace;
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>
<div id="centerText">👍🏼</div>
<div id="terminal"></div>

<audio id="hackSound" preload="auto">
    <source src="hack_sound.mp3" type="audio/mpeg">
</audio>

<script>
// Matrix background
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let letters = "01";
letters = letters.split("");
let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = [];
for(let x=0; x<columns; x++) drops[x]=1;

function drawMatrix(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#0f0";
    ctx.font=fontSize+"px monospace";
    for(let i=0;i<drops.length;i++){
        let text=letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);
        if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
        drops[i]++;
    }
}
setInterval(drawMatrix,33);

// Hacker animations
let centerText = document.getElementById("centerText");
let hackSound = document.getElementById("hackSound");
let terminal = document.getElementById("terminal");

function animate(x,y){
    let rotateX = (window.innerHeight/2 - y)/20;
    let rotateY = (x - window.innerWidth/2)/20;
    centerText.style.transform=`translate(-50%,-50%) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.3)`;
    centerText.style.textShadow="0 0 20px #0f0,0 0 40px #0f0,0 0 60px #0f0";
    // screen shake
    document.body.style.transform=`translate(${Math.random()*4-2}px,${Math.random()*4-2}px)`;
}

function reset(){
    centerText.style.transform="translate(-50%,-50%) rotateX(0deg) rotateY(0deg) scale(1)";
    centerText.style.textShadow="0 0 20px #0f0";
    document.body.style.transform="translate(0,0)";
}

// Terminal fake output
let commands = ["Initializing hack sequence...", "Bypassing firewall...", "Decrypting packets...", "Access granted!"];
let cmdIndex=0;
function runTerminal(){
    if(cmdIndex<commands.length){
        terminal.textContent += commands[cmdIndex] + "\n";
        cmdIndex++;
    }
}
setInterval(runTerminal,800);

// Events
document.addEventListener("mousemove",(e)=>{animate(e.clientX,e.clientY);});
document.addEventListener("mouseleave",reset);
document.addEventListener("touchstart",(e)=>{
    let t=e.touches[0];
    animate(t.clientX,t.clientY);
    hackSound.currentTime=0;
    hackSound.play();
});
document.addEventListener("touchmove",(e)=>{
    let t=e.touches[0];
    animate(t.clientX,t.clientY);
});
document.addEventListener("touchend",reset);
</script>

</body>
</html>
