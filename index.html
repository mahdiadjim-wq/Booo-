<!DOCTYPE html>
<html>
<head>
    <title>boo 👻</title>
</head>

<body style="margin:0;background:black;color:#00ff00;font-family:monospace;overflow:hidden;">

<canvas id="matrix"></canvas>

<div id="centerText" style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
text-shadow:0 0 20px #00ff00;
">
👻 boo
</div>

<audio id="hackSound" autoplay>
  <source src="https://freesound.org/data/previews/331/331912_3248244-lq.mp3" type="audio/mpeg">
</audio>

<script>
// Matrix effect
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for (let x = 0; x < columns; x++)
    drops[x] = 1;

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#0f0";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        let text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 33);
</script>

</body>
</html>
